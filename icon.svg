<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pro_blue" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4facfe"/>
      <stop offset="1" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="soft_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#pro_blue)"/>

  <!-- Icon Content: Front View Bus -->
  <g filter="url(#soft_glow)" transform="translate(106, 106) scale(0.586)">
     <!-- Main Body -->
    <rect x="64" y="48" width="384" height="384" rx="48" fill="white"/>
    
    <!-- Windshield -->
    <path d="M96 96H416V200C416 217.673 401.673 232 384 232H128C110.327 232 96 217.673 96 200V96Z" fill="#4facfe"/>
    
    <!-- Lights -->
    <circle cx="128" cy="368" r="24" fill="#4facfe"/>
    <circle cx="384" cy="368" r="24" fill="#4facfe"/>
    
    <!-- Grill / Destination Board -->
    <rect x="192" y="360" width="128" height="16" rx="8" fill="#4facfe" fill-opacity="0.5"/>
    
    <!-- Top Sign -->
    <rect x="160" y="64" width="192" height="16" rx="8" fill="white" fill-opacity="0.8"/>
  </g>
</svg>






